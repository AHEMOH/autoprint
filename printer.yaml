# AutoPrint - Task / Requirements
# =====================================
# - Print one colorful page once per week
# - Printer: Canon PIXMA GX2050 MegaTank (host via environment)
# - Docker container with Compose
# - Configuration via Compose (environment variables) and web UI
# - Custom image (Debian + CUPS + Python)
#
# Goal: keep printhead nozzles active, especially yellow.
# (On MegaTank printers, tank ink does not dry out,
#  but printhead nozzles can clog if unused.)
#
# Canon GX2050 notes:
#   - MegaTank refill system (C, M, Y, PGBK)
#   - IPP Everywhere / AirPrint / Mopria: no vendor driver needed
#   - Network hostname/IPP URI depends on your local network
#   - Example URI: ipp://my-printer.local/ipp/print
#
# Implementation files:
#   docker-compose.yml  - service definition + settings
#   Dockerfile          - image build (Python 3.12 + CUPS + Flask + Pillow)
#   entrypoint.sh       - startup: CUPS config + printer registration + ipptool test
#   autoprint.py        - weekly print scheduler, generated image, web dashboard
#
# Quick start:
#   1. Copy .env.example to .env and set values
#      (PRINTER_URI, PRINT_WEEKDAY, PRINT_TIME, TZ)
#   2. If hostname does not resolve: configure dns or extra_hosts
#      (see comments in docker-compose.yml)
#   3. docker compose up -d
#   4. http://localhost:8080  -> dashboard (printer status, manual print, history)
#      http://localhost:631   -> CUPS web UI (printer management)
